<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Simple Activity</title>
</head>
<body>
  <h1>Hello Discord Activity 👋</h1>
  <p id="user">Loading user...</p>

  <script type="module">
    import { DiscordSDK } from "https://cdn.jsdelivr.net/npm/@discord/embedded-app-sdk/+esm";

    const discordSdk = new DiscordSDK("1515597905988292658");

    async function setup() {
      await discordSdk.ready();

      const auth = await discordSdk.commands.authenticate({
        scope: ["identify"]
      });

      const user = auth.user;
      document.getElementById("user").innerText =
        `Hello ${user.username}`;
    }

    setup();
  </script>
</body>
</html>
